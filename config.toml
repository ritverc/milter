# Sender-domain whitelist: mail FROM any of these domains is never flagged by
# the fuzzy check. List legitimate domains that send mail and might otherwise
# be falsely matched against their own typosquats in history. Do NOT put
# typosquat/suspicious domains here.
trusted_domains = [
    # Legitimate sender domains (also appear in known_domains above on purpose)
    "gmail.com",
    "yahoo.com",
    "outlook.com",
    "hotmail.com",
    "mail.ru",
    "yandex.ru",
