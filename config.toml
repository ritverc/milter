# ============================================================================
# amavis-milter configuration
# ============================================================================
#
# Each trigger defines:
#   type             : "domain_age" | "false_reply" | "fuzzy_domain"
#   enabled          : bool
#   params           : check-specific parameters (see below)
#   action           : what to do when the trigger fires
#     header_name          : X-header to add
#     header_value         : value for the X-header
#     spam_score_increase  : how much to add to the spam score
#     subject_prefix       : optional prefix prepended to Subject
#
# NOTE: when [milter].strip_existing_prefixes is enabled (default), EVERY
# occurrence of the NEW (fired) subject_prefix is removed from the Subject
# — including prefixes hidden behind Re:/Fw: reply markers — before the new
# prefix is prepended exactly once, so re-processed messages never accumulate
# duplicate prefixes.
#
# Triggers can be combined into groups with mode:
#   "all"      — all listed triggers must fire
#   "any"      — at least one trigger must fire
#   "majority" — more than half must fire
#
# Groups have their own action, applied IN ADDITION to individual trigger
# actions when the group condition is met.
# ============================================================================


# ---------------------------------------------------------------------------
# Milter daemon settings
# ---------------------------------------------------------------------------
[milter]
socket = "inet:11334@127.0.0.1"   # listen address (inet / unix socket)
name   = "amavis-milter"          # milter name reported to MTA
timeout = 300                     # per-connection timeout (seconds)
pid_file = "/opt/zimbra/log/milter.pid"  # PID file path (set to "" to disable)

# When a message is processed more than once (re-injection, forwarding back
# through the milter, etc.) the subject_prefix values added by triggers/groups
# would otherwise pile up, e.g. "[LOOKALIKE] Re: [LOOKALIKE] Re: ... Hello".
# When enabled, EVERY occurrence of the NEW (fired) subject prefix is removed
# from the Subject — including prefixes hidden behind Re:/Fw: reply markers —
# BEFORE the new prefix is prepended exactly once, so the Subject always
# reflects the current rule evaluation and never accumulates duplicates.
strip_existing_prefixes = true

# Spam flag: when the total spam score from all fired triggers/groups reaches
# this threshold, an additional header is added to the message to mark it as
# spam.  Set spam_threshold to 0 to disable (no spam flag is ever added).
spam_threshold    = 5.0
spam_flag_header  = "X-Spam-Status"
spam_flag_value   = "spam"

# ---------------------------------------------------------------------------
# RDAP client settings
# ---------------------------------------------------------------------------
#
# RDAP (Registration Data Access Protocol) replaces the legacy WHOIS
# protocol. It returns structured JSON with reliable ``dates.created``
# fields, works over HTTPS, and supports any TLD.
#
# who-dat.as93.net is a public RDAP lookup service that normalises
# responses from all TLD registries into a consistent format.
# You can replace it with any compatible RDAP proxy or a self-hosted
# instance of https://github.com/niccolo-nicoli/who-dat
#
[rdap]
service_url     = "https://who-dat.as93.net"   # RDAP lookup service URL
timeout         = 10.0                          # per-query timeout (seconds)
cache_ttl       = 86400                         # cache results for 24 hours
cache_max_size  = 10000                         # max cached domains
max_concurrent  = 10                            # max parallel RDAP requests


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[logging]
level  = "INFO"                                              # DEBUG | INFO | WARNING | ERROR
file   = ""                                                  # empty = stderr
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"


# ===========================================================================
# TRIGGERS
# ===========================================================================

# --- Trigger 1: Domain Age -------------------------------------------------
#
# Checks the sender's domain creation date via WHOIS.
# Fires when the domain is younger than max_age_days.
#
# Parameters:
#   max_age_days     : int   — maximum age in days to consider suspicious
#   trusted_domains  : list  — domains exempt from this check
#   tld_priorities   : dict  — TLD → extra score for suspicious TLDs
#
[triggers.domain_age_young]
type    = "domain_age"
enabled = true

[triggers.domain_age_young.params]
max_age_days    = 60
trusted_domains = [
    "gmail.com",
    "yahoo.com",
    "outlook.com",
    "hotmail.com",
    "mail.ru",
    "yandex.ru",
    "rambler.ru",
    "protonmail.com",
    "icloud.com",
    "aol.com",
    "ritverc.local",
    "ritverc.kz",
    "ritverc.com",
    "ritverc.ru",
    "young.com",
]

[triggers.domain_age_young.params.tld_priorities]
# High-risk TLDs that get extra spam score when combined with young domain
xyz   = 2.0
top   = 2.0
club  = 1.5
online = 1.5
site  = 1.5
buzz  = 2.0
icu   = 2.0
click = 2.5

[triggers.domain_age_young.action]
header_name         = "X-Domain-Age-Young"
header_value        = "YES"
spam_score_increase = 3.0
subject_prefix      = "[YOUNG-DOMAIN]"


# --- Trigger 1b: Very young domain (stricter) -----------------------------
#
[triggers.domain_age_very_young]
type    = "domain_age"
enabled = true

[triggers.domain_age_very_young.params]
max_age_days    = 30
trusted_domains = [
    "gmail.com", "yahoo.com", "outlook.com", "hotmail.com",
    "mail.ru", "yandex.ru", "rambler.ru", "protonmail.com",
]

[triggers.domain_age_very_young.action]
header_name         = "X-Domain-Very-Young"
header_value        = "CRITICAL"
spam_score_increase = 5.0
subject_prefix      = "[NEW-DOMAIN]"


# --- Trigger 2: False Reply ------------------------------------------------
#
# Detects Re:/Fw: in Subject without valid In-Reply-To or References.
#
# Parameters:
#   reply_prefixes    : list — prefixes considered as "reply" indicators
#   check_in_reply_to : bool — verify In-Reply-To header
#   check_references  : bool — verify References header
#
[triggers.false_reply]
type    = "false_reply"
enabled = true

[triggers.false_reply.params]
reply_prefixes    = ["Re:", "RE:", "Fw:", "FW:", "Fwd:", "Ответ:", "Пересылка:", "На:"]
check_in_reply_to = true
check_references  = true

[triggers.false_reply.action]
header_name         = "X-False-Reply"
header_value        = "YES"
spam_score_increase = 2.5
subject_prefix      = "[FAKE-REPLY]"


# --- Trigger 3: Fuzzy Domain Similarity ------------------------------------
#
# Compares sender's domain against known/seen domains.
# Fires when similarity exceeds the threshold (potential typosquatting).
#
# Parameters:
#   similarity_threshold : float — similarity ratio 0..1
#   min_length           : int   — skip short sender domains
#   known_domains        : list  — REFERENCE TARGETS: legitimate "victim" domains
#                                  compared AGAINST the sender. NOT an exemption
#                                  list — it is the set of domains whose
#                                  typosquats we want to catch (e.g. put
#                                  "gmail.com" here to flag "gmai.com").
#   trusted_domains      : list  — SENDER-DOMAIN WHITELIST: if the sender's own
#                                  domain is listed here, the check is skipped
#                                  entirely (never flagged) — even if a similar
#                                  typosquat is already in history. Subdomains of
#                                  a trusted domain are also trusted (e.g. trusted
#                                  "abcd.com" covers "mail.abcd.com"). Put ONLY
#                                  the legitimate domain here (e.g. "gmail.com"),
#                                  NEVER the typosquat.
#   same_tld_skip        : bool  — skip references whose TLD equals the sender's
#                                  TLD (reduces false positives like mail.ru↔yandex.ru)
#   history_file         : str   — path to JSON file with dynamically collected
#                                  domains. Only NON-flagged sender domains are
#                                  recorded; a domain that triggers this check is
#                                  NOT added, so detected typosquats never become
#                                  references for future comparisons.
#   history_max_entries  : int   — max entries in history file
#
# known_domains vs trusted_domains:
#   - known_domains   = "what we compare the sender AGAINST" (the good/victim list)
#   - trusted_domains = "whose sender we SKIP checking"      (a sender whitelist)
#   A legitimate domain (e.g. gmail.com) is typically listed in BOTH: in
#   known_domains (so its typosquats are caught) AND in trusted_domains (so
#   gmail.com itself is never falsely flagged when it sends mail). A typosquat
#   domain (e.g. gmai.com) goes in NEITHER — it is detected by similarity and,
#   per the history rule above, is never recorded in history either.
#
[triggers.fuzzy_domain]
type    = "fuzzy_domain"
enabled = true

[triggers.fuzzy_domain.params]
similarity_threshold = 0.75
min_length           = 4
known_domains = [
