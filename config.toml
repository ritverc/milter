#subject_prefix = ""

# ===========================================================================
# GROUPS (compound rules)
# ===========================================================================

# --- Group 1: Young domain + False reply → high confidence spam -----------
[groups.young_domain_fake_reply]
enabled  = true
mode     = "all"
triggers = ["domain_age_young", "false_reply"]

[groups.young_domain_fake_reply.action]
header_name         = "X-Spam-HighConfidence"
header_value        = "YOUNG-DOMAIN+FAKE-REPLY"
spam_score_increase = 5.0
subject_prefix      = "[SPAM-HC]"


# --- Group 2: Fuzzy domain + False reply → phishing attempt ---------------
[groups.phishing_attempt]
enabled  = true
mode     = "all"
triggers = ["fuzzy_domain", "false_reply"]

[groups.phishing_attempt.action]
header_name         = "X-Phishing-Suspect"
header_value        = "LOOKALIKE+FAKE-REPLY"
spam_score_increase = 6.0
subject_prefix      = "[PHISHING]"


# --- Group 3: Any trigger fires → general suspicious ----------------------
[groups.any_suspicious]
enabled  = true
mode     = "any"
triggers = ["domain_age_young", "false_reply", "fuzzy_domain"]

[groups.any_suspicious.action]
header_name         = "X-Suspicious"
header_value        = "YES"
spam_score_increase = 1.0
subject_prefix      = ""


# --- Group 4: Majority of triggers → very high confidence -----------------
[groups.majority_suspicious]
enabled  = true
mode     = "majority"
triggers = ["domain_age_young", "false_reply", "fuzzy_domain"]

[groups.majority_suspicious.action]
header_name         = "X-Spam-VeryHighConfidence"
header_value        = "MAJORITY-RULE"
spam_score_increase = 8.0
subject_prefix      = "[SPAM-VHC]"


# --- Group 5: Very young + Fuzzy + False reply → critical -----------------
[groups.critical_spam]
enabled  = true
mode     = "all"
triggers = ["domain_age_very_young", "fuzzy_domain", "false_reply"]

[groups.critical_spam.action]
header_name         = "X-Spam-Critical"
header_value        = "CRITICAL-MULTI"
spam_score_increase = 15.0
subject_prefix      = "[CRITICAL-SPAM]"
